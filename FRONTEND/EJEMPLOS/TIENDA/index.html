<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tienda Bootstrap</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap-icons.min.css" rel="stylesheet">

    <link href="imgs/cart4.svg" rel="icon">

    <script defer src="js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/tienda.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-sm bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Tienda Bootstrap</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-sm-0">
                    <li class="nav-item">
                        <a class="nav-link" href="javascript:mostrarProductos()">Productos</a>
                    </li>
                </ul>
                <form id="formulario-busqueda" class="d-flex" role="search">
                    <input name="texto" class="form-control me-2" type="search" placeholder="Buscar"
                        aria-label="Search" />
                    <button class="btn btn-outline-light" type="submit">Buscar</button>
                </form>
                <ul class="navbar-nav ms-auto mb-2 mb-sm-0">
                    <li class="nav-item">
                        <a class="nav-link" href="javascript:mostrarAdminListado()">Admin</a>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

    <main class="container my-5">
        <section id="productos">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 row-cols-xxl-6 g-4">
            </div>
        </section>

        <section id="admin-listado">
            <h1>Admin listado</h1>

            <table class="table table-hover table-striped table-bordered">
                <caption>Mantenimiento de productos</caption>

                <thead class="table-secondary">
                    <tr>
                        <th class="text-end">Id</th>
                        <th>Nombre</th>
                        <th class="text-end">Precio</th>
                        <th>OPCIONES</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>

                <tfoot class="table-secondary">
                    <tr>
                        <td colspan="3"></td>
                        <td>
                            <a href="javascript:mostrarFormulario()" class="btn btn-sm btn-primary">
                                <i class="bi bi-plus-lg"></i>
                            </a>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </section>

        <section id="formulario">
            <form novalidate>
                <div class="row mb-3">
                    <label for="id" class="col-sm-2 col-form-label">Id</label>
                    <div class="col-sm">
                        <input readonly type="number" class="form-control" id="id" name="id">
                        <div class="invalid-feedback">
                            El Id debe ser positivo
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="nombre" class="col-sm-2 col-form-label">Nombre</label>
                    <div class="col-sm">
                        <input required type="text" class="form-control" id="nombre" name="nombre">
                        <div class="invalid-feedback">
                            El nombre es obligatorio
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="precio" class="col-sm-2 col-form-label">Precio</label>
                    <div class="col-sm">
                        <input required min="0" type="number" step=".01" class="form-control" id="precio" name="precio">
                        <div class="invalid-feedback">
                            El precio es obligatorio y debe ser positivo
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="departamento" class="col-sm-2 col-form-label">Departamento</label>
                    <div class="col-sm">
                        <input required type="text" class="form-control" id="departamento" name="departamento">
                        <div class="invalid-feedback">
                            El departamento es obligatorio
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="offset-sm-2 col-sm">
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </div>

            </form>
        </section>
    </main>

    <footer class="p-2 text-bg-dark">
        &copy;2026 Javier Lete
    </footer>

</body>

</html>

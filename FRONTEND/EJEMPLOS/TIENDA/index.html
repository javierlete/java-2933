<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tienda Bootstrap</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap-icons.min.css" rel="stylesheet">

    <link href="imgs/cart4.svg" rel="icon">

    <script defer src="js/bootstrap.bundle.min.js"></script>

    <script type="module" src="js/componentes.js"></script>
    <script type="module" src="js/tienda.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-sm bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Tienda Bootstrap</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-sm-0">
                    <li class="nav-item">
                        <a class="nav-link" href="javascript:mostrarProductos()">Productos</a>
                    </li>
                </ul>
                <form id="formulario-busqueda" class="d-flex" role="search">
                    <input name="texto" class="form-control me-2" type="search" placeholder="Buscar"
                        aria-label="Search" />
                    <button class="btn btn-outline-light" type="submit">Buscar</button>
                </form>
                <ul class="navbar-nav ms-auto mb-2 mb-sm-0">
                    <li class="nav-item">
                        <a class="nav-link" href="javascript:mostrarAdminListado()">Admin</a>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

    <main class="container my-5">
        <section id="productos">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 row-cols-xxl-6 g-4">
            </div>
        </section>

        <section id="admin-listado">
            <h1>Admin listado</h1>

            <table class="table table-hover table-striped table-bordered">
                <caption>Mantenimiento de productos</caption>

                <thead class="table-secondary">
                    <tr>
                        <th class="text-end">Id</th>
                        <th>Nombre</th>
                        <th class="text-end">Precio</th>
                        <th>OPCIONES</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>

                <tfoot class="table-secondary">
                    <tr>
                        <td colspan="3"></td>
                        <td>
                            <a href="javascript:mostrarFormulario()" class="btn btn-sm btn-primary">
                                <i class="bi bi-plus-lg"></i>
                            </a>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </section>

        <section id="formulario">
            <form novalidate>
                <jl-label-input etiqueta="Id" identificador="id" tipo="number" atributos="readonly" error="El id debe ser positivo"></jl-label-input>
                <jl-label-input etiqueta="Nombre" identificador="nombre" tipo="text" atributos="required" error="El nombre es obligatorio"></jl-label-input>
                <jl-label-input etiqueta="Precio" identificador="precio" tipo="number" atributos="required min='0' step='.01'" error="El precio es obligatorio y debe ser positivo"></jl-label-input>
                <jl-label-input etiqueta="Departamento" identificador="departamento" tipo="text" atributos="required" error="El departamento es obligatorio"></jl-label-input>
                <jl-label-input etiqueta="Guardar" tipo="submit"></jl-label-input>
            </form>
        </section>
    </main>

    <footer class="p-2 text-bg-dark">
        &copy;2026 Javier Lete
    </footer>

</body>

</html>

<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tienda Bootstrap</title>

    <base href="/FRONTEND/BOOTSTRAP/">

    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap-icons.min.css" rel="stylesheet">

    <link href="imgs/cart4.svg" rel="icon">
</head>

<body>
    <nav class="navbar navbar-expand-sm bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Tienda Bootstrap</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-sm-0">
                    <li class="nav-item">
                        <a class="nav-link" href="productos.html">Productos</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Buscar" aria-label="Search" />
                    <button class="btn btn-outline-light" type="submit">Buscar</button>
                </form>
                <ul class="navbar-nav ms-auto mb-2 mb-sm-0">
                    <li class="nav-item">
                        <a class="nav-link" href="admin/listado.html">Admin</a>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

    <main class="container my-5">
        <form action="admin/listado.html" class="needs-validation" novalidate>
            <div class="row mb-3">
                <label for="id" class="col-sm-2 col-form-label">Id</label>
                <div class="col-sm">
                    <input min="0" type="number" class="form-control" id="id">
                    <div class="invalid-feedback">
                        El Id debe ser positivo
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <label for="nombre" class="col-sm-2 col-form-label">Nombre</label>
                <div class="col-sm">
                    <input required type="text" class="form-control" id="nombre">
                    <div class="invalid-feedback">
                        El nombre es obligatorio
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <label for="precio" class="col-sm-2 col-form-label">Precio</label>
                <div class="col-sm">
                    <input required min="0" type="number" step=".01" class="form-control" id="precio">
                    <div class="invalid-feedback">
                        El precio es obligatorio y debe ser positivo
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <label for="categoria" class="col-sm-2 col-form-label">Categoria</label>
                <div class="col-sm">
                    <select required class="form-select" id="categoria">
                        <option selected disabled value="">---</option>
                        <option value="1">Informática</option>
                        <option value="2">Electrónica</option>
                        <option value="3">Electrodomésticos</option>
                    </select>
                    <div class="invalid-feedback">
                        Debes seleccionar una categoría
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <label for="descripcion" class="col-sm-2 col-form-label">Descripción</label>
                <div class="col-sm">
                    <textarea minlength="80" class="form-control" id="descripcion"></textarea>
                    <div class="invalid-feedback">
                        La descripción debe tener como mínimo 80 caracteres
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="offset-sm-2 col-sm">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </div>

        </form>

        <script>
            // Example starter JavaScript for disabling form submissions if there are invalid fields
            (() => {
                'use strict'

                // Fetch all the forms we want to apply custom Bootstrap validation styles to
                const forms = document.querySelectorAll('.needs-validation')

                // Loop over them and prevent submission
                Array.from(forms).forEach(form => {
                    form.addEventListener('submit', event => {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }

                        form.classList.add('was-validated')
                    }, false)
                })
            })()
        </script>
    </main>

    <footer class="p-2 text-bg-dark">
        &copy;2026 Javier Lete
    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>

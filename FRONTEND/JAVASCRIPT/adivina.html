<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el número</title>
</head>
<body>
    <h1>Adivina el número</h1>

    <p class="elige">Elige un número entre 1 y 100</p>

    <form>
        <input required min="1" max="100" type="number" placeholder="Introduce un número">
    </form>

    <p class="resultado correcto">¡Has acertado!</p>
    <p class="resultado mayor">El número que hay que adivinar es mayor</p>
    <p class="resultado menor">El número que hay que adivinar es menor</p>

    <ul class="resultados">
        <li>¡Felicidades, era 40!</li>
        <li>Es mayor que 33</li>
        <li>Es mayor que 25</li>
        <li>Es menor que 50</li>
    </ul>
</body>
</html>

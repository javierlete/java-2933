<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <link rel="stylesheet" href="css/calculadora_simple.css">
</head>
<body>
    <h1>Calculadora</h1>

    <form>
        <input type="number" placeholder="Operando 1">
        <select>
            <option disabled selected>Operación</option>
            <option>+</option>
            <option>-</option>
            <option>x</option>
            <option>/</option>
        </select>
        <input type="number" placeholder="Operando 2">
        <button>=</button>
        <input readonly placeholder="Resultado">
    </form>
</body>
</html>
